<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>📌 Sticky Notes Board</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=Playfair+Display:wght@500;600&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --cream:   #0f1729;
            --board:   #111d35;
            --text:    #e8ddd0;
            --muted:   #7a8aaa;
            --accent:  #f0a8c0;
            --shadow:  rgba(0,0,0,0.3);
            --glow:    0 0 12px rgba(240,168,192,0.2);
        }

        body {
            font-family: 'DM Sans', sans-serif;
            background: var(--cream);
            color: #c8d8e8;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* ── HEADER ── */
        header {
            background: rgba(10, 14, 30, 0.95);
            color: #e8ddd0;
            padding: 0 28px;
            height: 58px;
            display: flex;
            align-items: center;
            gap: 16px;
            box-shadow: 0 1px 0 rgba(0, 212, 255, 0.2), 0 4px 24px rgba(0,0,0,0.6);
            backdrop-filter: blur(12px);
            position: sticky; top: 0; z-index: 100;
        }

        .logo {
            font-family: 'Playfair Display', serif;
            font-size: 1.3rem;
            font-weight: 600;
            color: #f0a8c0;
            white-space: nowrap;
            letter-spacing: 0.04em; 
            text-shadow: 0 2px 12px rgba(240,168,192,0.3);
        }

        .header-sep { flex: 1; }

        #search-box {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(240,168,192,0.2);
            border-radius: 20px;
            padding: 6px 16px;
            color: #e8ddd0;
            font-family: 'DM Sans', sans-serif;
            font-size: 0.85rem;
            width: 200px;
            transition: border-color 0.2s, box-shadow 0.2s;
        }
        #search-box:focus { outline: none; border-color: rgba(240,168,192,0.6); box-shadow: var(--glow); }
        #search-box::placeholder { color: rgba(255,255,255,0.25); }

        .header-btn {
            background: rgba(240,168,192,0.15);
            color: #f0a8c0;
            border: 1px solid rgba(240,168,192,0.35);
            border-radius: 20px;
            padding: 7px 18px;
            font-family: 'DM Sans', sans-serif;
            font-weight: 600;
            font-size: 0.85rem;
            cursor: pointer;
            transition: background 0.2s, box-shadow 0.2s;
            white-space: nowrap;
        }
        .header-btn:hover { background: rgba(240,168,192,0.25); box-shadow: var(--glow); }

        .note-count {
            font-size: 0.8rem;
            color: rgba(255,255,255,0.5);
            white-space: nowrap;
        }

        /* BOARD  */
        #board {
            flex: 1;
            position: relative;
            overflow: hidden;
        }

        /*  EMPTY STATE  */
        #empty-msg {
            width: 100%;
            text-align: center;
            padding: 80px 20px;
            color: var(--muted);
            display: none;
        }
        #empty-msg .big { font-size: 3rem; margin-bottom: 12px; }
        #empty-msg p { font-family: 'Kalam', cursive; font-size: 1.2rem; }

        /*  STICKY NOTE  */
        .note {
            width: 280px;
            min-height: 240px;
            border-radius: 2px;
            padding: 0;
            display: flex;
            flex-direction: column;
            box-shadow: 0 0 0 1px rgba(255,255,255,0.06), 3px 4px 20px rgba(0,0,0,0.5);
            position: relative;
            /* transition: transform 0.2s, box-shadow 0.2s;
            animation: popIn 0.25s cubic-bezier(0.34, 1.56, 0.64, 1); */
            filter: saturate(1.1) brightness(1.4);
        }
        @keyframes popIn {
            from { opacity: 0; transform: scale(0.75) rotate(-2deg); }
            to   { opacity: 1; transform: scale(1) rotate(var(--rot)); }
        }
        .note:hover {
            transform: translateY(-4px) rotate(0deg) scale(1.02);
            box-shadow: 0 0 0 1px rgba(240,168,192,0.25), 0 8px 32px rgba(0,0,0,0.4);
            filter: saturate(1.1) brightness(1.25);
            z-index: 10;
        }


        /* Push-pin on pinned notes */
        .note.pinned::before {
            content: "📌";
            position: absolute;
            top: -10px; left: 50%; transform: translateX(-50%);
            font-size: 1.1rem;
            filter: drop-shadow(0 1px 2px rgba(0,0,0,0.3));
        }

        .note-top {
            padding: 10px 10px 8px;
            display: flex;
            align-items: flex-start;
            gap: 6px;
            border-bottom: 1px solid rgba(0,0,0,0.08);
        }

        .note-title {
            flex: 1;
            font-family: 'Playfair Display', serif;
            font-weight: 600;
            font-size: 0.95rem !important;
            color: rgba(3, 3, 3, 0.92);
            border: none; background: transparent;
            outline: none; resize: none;
            line-height: 1.3;
            cursor: text;
        }

        .btn-pin, .btn-del {
            background: none; border: none;
            cursor: pointer; padding: 2px 3px;
            border-radius: 4px;
            font-size: 0.9rem;
            opacity: 0.4;
            transition: opacity 0.15s, background 0.15s;
            line-height: 1;
            flex-shrink: 0;
        }
        .btn-pin:hover, .btn-del:hover { opacity: 1; background: rgba(0,0,0,0.08); }
        .note.pinned .btn-pin { opacity: 0.85; }

        .note-body {
            flex: 1;
            padding: 10px;
        }

        .note-content {
            width: 100%;
            font-family: 'DM Sans', sans-serif;
            font-size: 0.82rem !important;
            color: rgba(0, 0, 0, 0.82);
            border: none; background: transparent;
            outline: none; resize: none;
            min-height: 130px;
            line-height: 1.55;
            cursor: text;
        }

        .note-footer {
            padding: 6px 10px 8px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .note-date {
            font-size: 0.68rem;
            color: rgba(43, 42, 42, 0.4);
            font-family: 'DM Sans', sans-serif;
        }

        /* Color swatches — visible on hover */
        .color-row {
            display: flex; gap: 4px;
            opacity: 0; transition: opacity 0.2s;
        }
        .note:hover .color-row { opacity: 1; }

        .swatch {
            width: 11px; height: 11px;
            border-radius: 50%;
            cursor: pointer;
            border: 1.5px solid rgba(0,0,0,0.18);
            transition: transform 0.15s;
        }
        .swatch:hover { transform: scale(1.4); }

        /*  MODAL  */
        .overlay {
            position: fixed; inset: 0;
            background: rgba(0,0,0,0.45);
            z-index: 1000;
            display: flex; align-items: center; justify-content: center;
            animation: fadeIn 0.15s ease;
        }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .modal {
            background: #131e38;
            border: 1px solid rgba(240,168,192,0.15);
            border-radius: 16px;
            box-shadow: 0 24px 60px rgba(0,0,0,0.5);
            padding: 28px;
            width: 360px;
            animation: slideUp 0.22s cubic-bezier(0.34, 1.56, 0.64, 1);
        }
        @keyframes slideUp {
            from { opacity: 0; transform: translateY(20px) scale(0.95); }
            to   { opacity: 1; transform: none; }
        }

        .modal h2 {
            font-family: 'Playfair Display', serif;
            font-size: 1.4rem;
            font-weight: 600;
            margin-bottom: 18px;    
            color: #f0a8c0;
        }

        .field { margin-bottom: 14px; }
        .field label {
            display: block;
            font-size: 0.75rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: var(--muted);
            margin-bottom: 5px;
        }
        .field input, .field textarea {
            width: 100%;
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 10px;
            padding: 9px 12px;
            font-family: 'DM Sans', sans-serif;
            font-size: 0.88rem;
            color: #e8ddd0;
            background: rgba(255,255,255,0.05);
            transition: border-color 0.2s, box-shadow 0.2s;
        }

        .field input:focus, .field textarea:focus {
            outline: none;
            border-color: rgba(240,168,192,0.5);
            box-shadow: 0 0 10px rgba(240,168,192,0.1);
        }
        .field textarea { min-height: 90px; resize: vertical; }

        .color-picker { display: flex; gap: 8px; flex-wrap: wrap; }
        .color-opt {
            width: 30px; height: 30px;
            border-radius: 50%;
            cursor: pointer;
            border: 3px solid transparent;
            transition: transform 0.15s, border-color 0.15s;
        }
        .color-opt:hover   { transform: scale(1.15); }
        .color-opt.active  { border-color: #2d2416; transform: scale(1.15); }

        .modal-btns { display: flex; gap: 10px; margin-top: 20px; }
        .btn-cancel-modal {
            flex: 1; padding: 10px;
            background: transparent;
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 10px;
            color: var(--muted);
            font-family: 'DM Sans', sans-serif;
            font-weight: 500; font-size: 0.88rem;
            cursor: pointer; transition: border-color 0.2s, color 0.2s;
        }
        .btn-cancel-modal:hover { border-color: rgba(255,255,255,0.25); color: #e8ddd0; }

        .btn-save {
            flex: 2; padding: 10px;
            background: rgba(240,168,192,0.2);
            border: 1px solid rgba(240,168,192,0.4);
            border-radius: 10px;
            color: #f0a8c0;
            font-family: 'DM Sans', sans-serif;
            font-weight: 600; font-size: 0.88rem;
            cursor: pointer; transition: background 0.2s, box-shadow 0.2s;
        }
        .btn-save:hover { background: rgba(240,168,192,0.3); box-shadow: var(--glow); }

        /*  TOAST  */
        #toast {
            position: fixed; bottom: 24px; left: 50%;
            transform: translateX(-50%) translateY(60px);
            background: #131e38;
            color: #f0a8c0;
            border: 1px solid rgba(240,168,192,0.25);
            box-shadow: 0 4px 24px rgba(0,0,0,0.3);
            padding: 10px 22px; border-radius: 24px;
            font-size: 0.85rem; font-weight: 600;
            transition: transform 0.3s cubic-bezier(0.34,1.56,0.64,1), opacity 0.3s;
            z-index: 9999; opacity: 0; pointer-events: none;
        }
        #toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }
    </style>
</head>
<body>

<!-- HEADER -->
<header>
    <span class="logo">📌 Sticky Board</span>
    <div class="header-sep"></div>
    <input type="text" id="search-box" placeholder="🔍  Search notes…" oninput="handleSearch(this.value)">
    <span class="note-count" id="note-count"></span>
    <button class="header-btn" onclick="openModal()">+ New Note</button>
</header>

<!-- BOARD  -->
<div id="board">
    <div id="empty-msg">
        <div class="big">🗒️</div>
        <p>No notes yet — click "+ New Note" to get started!</p>
    </div>
</div>

<!-- MODAL  -->
<div class="overlay" id="modal" style="display:none" onclick="handleOverlayClick(event)">
    <div class="modal">
        <h2 id="modal-heading">✏️ New Note</h2>

        <div class="field">
            <label>Title *</label>
            <input type="text" id="f-title" placeholder="Note title…" maxlength="80">
        </div>

        <div class="field">
            <label>Content</label>
            <textarea id="f-content" placeholder="Write something…" maxlength="600"></textarea>
        </div>

        <div class="field">
            <label>Color</label>
            <div class="color-picker" id="color-picker"></div>
        </div>

        <div class="modal-btns">
            <button class="btn-cancel-modal" onclick="closeModal()">Cancel</button>
            <button class="btn-save" id="btn-save" onclick="saveNote()">Create Note</button>
        </div>
    </div>
</div>

<div id="toast"></div>

<!-- SCRIPT -->
<script>
    // Config
    const API = '/api/notes';

    const COLORS = [
        '#6b3d5a', // dusty rose
        '#2a4a6b', // slate blue
        '#3a5c38', // sage green
        '#6b5a28', // warm sand
        '#3d2e6b', // soft lavender
        '#6b3a28', // terracotta
        '#1e5555', // muted teal
        '#5a2850', // mauve
    ];

    const ROTATIONS = ['-1.5deg', '-0.5deg', '0deg', '0.8deg', '1.5deg'];

    let notes        = [];      // all notes fetched from API
    let editingId    = null;    // null = creating new; number = editing existing
    let chosenColor  = COLORS[0];
    let searchTimer  = null;
    let notePositions = {};   // stores { id: {x, y} } for each note
    let dragState     = null; // tracks active drag

    // Generate a stable random position from note id
    function randomPos(id) {
        const bw = window.innerWidth;
        const bh = window.innerHeight - 58;
        const seed = (id * 9301 + 49297) % 233280;
        const x = 40 + (seed % Math.max(100, bw - 320));
        const y = 40 + ((seed * 7) % Math.max(100, bh - 280));
        return { x, y };
    }

    // Drag & Drop 
    function initDrag(el, id) {
        el.addEventListener('mousedown', function(e) {
            // Don't drag when clicking buttons or textareas
            if (['TEXTAREA','BUTTON','SVG','PATH'].includes(e.target.tagName)) return;
            if (e.target.classList.contains('swatch')) return;
            e.preventDefault();
            const board    = document.getElementById('board');
            const boardRect = board.getBoundingClientRect();
            const noteRect  = el.getBoundingClientRect();
        
            dragState = {
                el,
                id,
                offsetX: e.clientX - noteRect.left,
                offsetY: e.clientY - noteRect.top,
                boardRect
            };

            el.style.transition = 'none';
            el.style.zIndex     = 999;
            el.style.transform  = 'rotate(2deg) scale(1.04)';
            el.style.boxShadow  = '0 16px 48px rgba(0,0,0,0.5)';
        });
    }
    document.addEventListener('mousemove', function(e) {
        if (!dragState) return;
        const { el, offsetX, offsetY, boardRect } = dragState;

        let x = e.clientX - boardRect.left - offsetX;
        let y = e.clientY - boardRect.top  - offsetY;
        
        // Keep note within board bounds
        x = Math.max(0, Math.min(boardRect.width  - 230, x));
        y = Math.max(0, Math.min(boardRect.height - 200, y));

        el.style.left = x + 'px';
        el.style.top  = y + 'px';
    });

    document.addEventListener('mouseup', function(e) {
        if (!dragState) return;
        const { el, id } = dragState;
        const x = parseFloat(el.style.left);
        const y = parseFloat(el.style.top);
        // Save the new position
        notePositions[id] = { x, y };
        const rot = ROTATIONS[id % ROTATIONS.length];
        el.style.transition = 'transform 0.2s, box-shadow 0.2s';
        el.style.transform  = 'rotate(' + rot + ')';
        el.style.boxShadow  = '';
        el.style.zIndex     = 1;
        dragState = null;
    });

    // Boot 
    buildColorPicker();
    loadNotes();

    //  Color Picker 
    function buildColorPicker() {
        const cp = document.getElementById('color-picker');
        COLORS.forEach(c => {
            const d = document.createElement('div');
            d.className = 'color-opt';
            d.style.background = c;
            d.dataset.color = c;
            d.onclick = () => pickColor(c);
            cp.appendChild(d);
        });
        pickColor(COLORS[0]);
    }

    function pickColor(c) {
        chosenColor = c;
        document.querySelectorAll('.color-opt').forEach(d => {
            d.classList.toggle('active', d.dataset.color === c);
        });
    }

    // Load Notes from API 
    async function loadNotes() {
        try {
            const res = await fetch(API);
            notes = await res.json();
            renderBoard(notes);
        } catch (e) {
            toast('⚠️ Could not reach the server');
        }
    }

    // Render Board
    function renderBoard(list) {
        const board = document.getElementById('board');
        // Remove all existing note cards
        board.querySelectorAll('.note').forEach(n => n.remove());

        document.getElementById('empty-msg').style.display =
            list.length === 0 ? 'block' : 'none';

        const total = notes.length;
        document.getElementById('note-count').textContent =
            total === 0 ? '' : total + (total === 1 ? ' note' : ' notes');

        list.forEach(note => board.appendChild(makeNoteCard(note)));
    }

    // Build a Note Card element
    function makeNoteCard(note) {
        const el = document.createElement('div');
        el.className = 'note' + (note.pinned ? ' pinned' : '');
        el.dataset.id = note.id;
        el.style.background = note.color || '#fef08a';
        el.style.position = 'absolute';

        // Use saved position or generate a random one based on note id
        const pos = notePositions[note.id] || randomPos(note.id);
        notePositions[note.id] = pos;
        el.style.left = pos.x + 'px';
        el.style.top  = pos.y + 'px';
        el.style.setProperty('--rot', ROTATIONS[note.id % ROTATIONS.length]);
        el.style.transform = 'rotate(' + ROTATIONS[note.id % ROTATIONS.length] + ')';

        // Color swatches
        const swatches = COLORS.map(c =>
            `<div class="swatch" style="background:${c}"
                  onclick="changeColor(event,${note.id},'${c}')"></div>`
        ).join('');

        el.innerHTML = `
            <div class="note-top">
                <button class="btn-pin" onclick="togglePin(event,${note.id})"
                        title="${note.pinned ? 'Unpin' : 'Pin'}">
                    ${note.pinned ? '📌' : '📍'}
                </button>
                <textarea class="note-title" rows="1"
                    placeholder="Title…"
                    onblur="saveInline(${note.id})"
                    oninput="autoH(this)">${esc(note.title)}</textarea>
                <button class="btn-del" onclick="deleteNote(event,${note.id})" title="Delete">✕</button>
            </div>
            <div class="note-body">
                <textarea class="note-content"
                    placeholder="Write something…"
                    onblur="saveInline(${note.id})"
                    oninput="autoH(this)">${esc(note.content || '')}</textarea>
            </div>
            <div class="note-footer">
                <span class="note-date">${note.createdAt || ''}</span>
                <div class="color-row">${swatches}</div>
            </div>`;

        // Auto-size textareas after rendering
         
        setTimeout(() => {
            
            el.querySelectorAll('textarea').forEach(autoH);
        
        }, 0);

        // Enable drag
        initDrag(el, note.id);

        return el;
    }

    // Inline Save
    async function saveInline(id) {
        const el  = document.querySelector(`.note[data-id="${id}"]`);
        if (!el) return;
        const title   = el.querySelector('.note-title').value.trim();
        const content = el.querySelector('.note-content').value;
        if (!title) return;

        // Only save if something actually changed
        const original = notes.find(n => n.id === id);
        if (original && title === original.title && content === (original.content || '')) return;

        try {
            const res  = await fetch(`${API}/${id}`, {
                method: 'PUT',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ title, content })
            });
            const updated = await res.json();
            const idx = notes.findIndex(n => n.id === id);
            if (idx >= 0) notes[idx] = { ...notes[idx], ...updated };
        } catch (e) { /* silent — note stays as-is */ }
    }

    // Toggle Pin
    async function togglePin(e, id) {
        e.stopPropagation();
        try {
            const res  = await fetch(`${API}/${id}/pin`, { method: 'PATCH' });
            const note = await res.json();
            const idx  = notes.findIndex(n => n.id === id);
            if (idx >= 0) notes[idx] = note;
            renderBoard(notes);
            toast(note.pinned ? '📌 Note pinned' : '📍 Unpinned');
        } catch (e) { toast('⚠️ Something went wrong'); }
    }

    // Change Color
    async function changeColor(e, id, color) {
        e.stopPropagation();
        const el = document.querySelector(`.note[data-id="${id}"]`);
        if (el) el.style.background = color;
        try {
            await fetch(`${API}/${id}`, {
                method: 'PUT',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ color })
            });
            const idx = notes.findIndex(n => n.id === id);
            if (idx >= 0) notes[idx].color = color;
        } catch (e) { /* silent */ }
    }

    // Delete Note
    async function deleteNote(e, id) {
        e.stopPropagation();
        const el = document.querySelector(`.note[data-id="${id}"]`);

        // Animate out
        if (el) {
            el.style.transition = 'transform 0.2s, opacity 0.2s';
            el.style.transform  = 'scale(0.7) rotate(5deg)';
            el.style.opacity    = '0';
            await new Promise(r => setTimeout(r, 200));
        }

        try {
            await fetch(`${API}/${id}`, { method: 'DELETE' });
            notes = notes.filter(n => n.id !== id);
            renderBoard(notes);
            toast('🗑️ Note deleted');
        } catch (err) {
            toast('⚠️ Could not delete');
            loadNotes();
        }
    }

    // Search 
    function handleSearch(val) {
        clearTimeout(searchTimer);
        searchTimer = setTimeout(() => {
            if (!val.trim()) {
                renderBoard(notes);
                return;
            }
            const q = val.toLowerCase();
            const filtered = notes.filter(n =>
                n.title.toLowerCase().includes(q) ||
                (n.content || '').toLowerCase().includes(q)
            );
            renderBoard(filtered);
        }, 200);
    }

    // Modal 
    function openModal(id) {
        editingId = id || null;
        const heading = document.getElementById('modal-heading');
        const saveBtn = document.getElementById('btn-save');

        if (editingId) {
            const note = notes.find(n => n.id === editingId);
            document.getElementById('f-title').value   = note ? note.title   : '';
            document.getElementById('f-content').value = note ? note.content : '';
            pickColor(note ? note.color : COLORS[0]);
            heading.textContent  = '✏️ Edit Note';
            saveBtn.textContent  = 'Save Changes';
        } else {
            document.getElementById('f-title').value   = '';
            document.getElementById('f-content').value = '';
            pickColor(COLORS[Math.floor(Math.random() * COLORS.length)]);
            heading.textContent = '✏️ New Note';
            saveBtn.textContent = 'Create Note';
        }

        document.getElementById('modal').style.display = 'flex';
        setTimeout(() => document.getElementById('f-title').focus(), 60);
    }

    function closeModal() {
        document.getElementById('modal').style.display = 'none';
        editingId = null;
    }

    function handleOverlayClick(e) {
        if (e.target.id === 'modal') closeModal();
    }

    // Save 
    async function saveNote() {
        const title   = document.getElementById('f-title').value.trim();
        const content = document.getElementById('f-content').value;

        if (!title) {
            document.getElementById('f-title').focus();
            toast('⚠️ Please enter a title');
            return;
        }

        const payload = { title, content, color: chosenColor };

        try {
            if (editingId) {
                // UPDATE 
                const res  = await fetch(`${API}/${editingId}`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
                const updated = await res.json();
                const idx = notes.findIndex(n => n.id === editingId);
                if (idx >= 0) notes[idx] = updated;
                toast('✅ Note updated');
            } else {
                // CREATE
                const res   = await fetch(API, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
                const created = await res.json();
                notes.push(created);
                toast('✅ Note created!');
            }

            renderBoard(notes);
            closeModal();
        } catch (e) {
            toast('⚠️ Could not save the note');
        }
    }

    // Toast notification
    let toastTimer;
    function toast(msg) {
        const el = document.getElementById('toast');
        el.textContent = msg;
        el.classList.add('show');
        clearTimeout(toastTimer);
        toastTimer = setTimeout(() => el.classList.remove('show'), 2400);
    }

    // Helpers 
    function autoH(el) {
        el.style.height = 'auto';
        el.style.height = el.scrollHeight + 'px';
    }

    function esc(s) {
        return (s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    }

    // Keyboard shortcuts 
    document.addEventListener('keydown', e => {
        if (e.key === 'Escape') closeModal();
        if ((e.ctrlKey || e.metaKey) && e.key === 'n') {
            e.preventDefault();
            openModal();
        }
    });
</script>
</body>
</html>
